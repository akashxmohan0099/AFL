name: Daily Pipeline

# Safety-net daily run. The game-update.yml workflow handles real-time
# updates after each game; this ensures nothing is missed and runs
# the full pipeline once per day regardless.

on:
  schedule:
    # Tuesdays & Wednesdays at 06:00 UTC — between rounds, no games
    # Catches any data the game-update workflow may have missed
    - cron: "0 6 * * 2,3"
  workflow_dispatch:
    inputs:
      year:
        description: "Season year"
        default: "2026"
      full_seed:
        description: "Re-seed all tables (not just incremental)"
        type: boolean
        default: false

env:
  YEAR: ${{ github.event.inputs.year || '2026' }}

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-extra.txt
          python -m pip install supabase

      # Restore data cache from previous runs so the pipeline can do incremental updates
      - name: Restore data cache
        uses: actions/cache/restore@v4
        with:
          path: |
            data/base
            data/features
            data/models
            data/sequential
            data/fixtures
            data/footywire
            data/learning
            data/news
            data/forecasts
            data/umpires
          key: pipeline-data-${{ env.YEAR }}-${{ github.run_number }}
          restore-keys: |
            pipeline-data-${{ env.YEAR }}-

      - name: Run daily pipeline
        run: python pipeline.py --daily --year ${{ env.YEAR }}
        env:
          PYTHONUNBUFFERED: "1"

      - name: Save data cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            data/base
            data/features
            data/models
            data/sequential
            data/fixtures
            data/footywire
            data/learning
            data/news
            data/forecasts
            data/umpires
          key: pipeline-data-${{ env.YEAR }}-${{ github.run_number }}

      - name: Seed Supabase (incremental)
        if: ${{ github.event.inputs.full_seed != 'true' }}
        run: |
          for table in matches player_games team_matches predictions outcomes game_predictions weather fixtures news mc_simulations; do
            echo "--- Seeding $table ---"
            python supabase/seed.py --table "$table" || echo "Warning: $table seed failed, continuing..."
          done
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Seed Supabase (full)
        if: ${{ github.event.inputs.full_seed == 'true' }}
        run: python supabase/seed.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
