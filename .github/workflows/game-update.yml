name: Game Update

# Runs during AFL game windows to detect newly completed games and update
# the database. If the round is complete, also generates predictions for
# the next round.
#
# AFL typical schedule (AEDT, UTC+11 during season):
#   Thursday  7:20 PM → ends ~10:00 PM AEDT (11:00 UTC)
#   Friday    7:50 PM → ends ~10:30 PM AEDT (11:30 UTC)
#   Saturday  1:45 PM → last game ends ~10:00 PM AEDT (03:00-11:00 UTC)
#   Sunday    1:10 PM → last game ends ~7:30 PM AEDT (02:00-08:30 UTC)
#
# After daylight saving ends (April): add 1 hour to UTC times.

on:
  schedule:
    # Hourly checks during game windows (Thu-Mon, 04:00-13:00 UTC)
    # Covers both AEDT and AEST afternoon/evening games
    - cron: "0 4-13 * * 0,1,4,5,6"
  workflow_dispatch:
    inputs:
      year:
        description: "Season year"
        default: "2026"
      force_run:
        description: "Skip game check and run pipeline regardless"
        type: boolean
        default: false

env:
  YEAR: ${{ github.event.inputs.year || '2026' }}

# Prevent concurrent runs — if a new run triggers while one is active,
# cancel the older one (new data supersedes old)
concurrency:
  group: game-update-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────
  # Job 1: Quick check — are there new games?
  # Runs in ~30 seconds. No ML dependencies.
  # ────────────────────────────────────────────
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    # Skip check on manual dispatch with force_run
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.force_run != 'true' }}
    outputs:
      has_new_games: ${{ steps.check.outputs.has_new_games }}
      round_complete: ${{ steps.check.outputs.round_complete }}
      current_round: ${{ steps.check.outputs.current_round }}

    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: scripts/game_check.py

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check for new games
        id: check
        run: python scripts/game_check.py
        env:
          YEAR: ${{ env.YEAR }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

  # ────────────────────────────────────────────
  # Job 2: Full pipeline — scrape, learn, predict
  # Only runs when new games are detected.
  # ────────────────────────────────────────────
  update:
    needs: check
    # Run if: new games found OR manual dispatch with force_run
    if: |
      always() && (
        needs.check.outputs.has_new_games == 'true' ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.force_run == 'true')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-extra.txt
          python -m pip install supabase

      - name: Restore data cache
        uses: actions/cache/restore@v4
        with:
          path: |
            data/base
            data/features
            data/models
            data/sequential
            data/fixtures
            data/footywire
            data/learning
            data/news
            data/forecasts
            data/umpires
          key: pipeline-data-${{ env.YEAR }}-${{ github.run_number }}
          restore-keys: |
            pipeline-data-${{ env.YEAR }}-

      - name: Run pipeline
        run: python pipeline.py --daily --year ${{ env.YEAR }}
        env:
          PYTHONUNBUFFERED: "1"

      - name: Save data cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            data/base
            data/features
            data/models
            data/sequential
            data/fixtures
            data/footywire
            data/learning
            data/news
            data/forecasts
            data/umpires
          key: pipeline-data-${{ env.YEAR }}-${{ github.run_number }}

      - name: Seed results to Supabase
        run: |
          python supabase/seed.py --table matches
          python supabase/seed.py --table player_games
          python supabase/seed.py --table team_matches
          python supabase/seed.py --table predictions
          python supabase/seed.py --table outcomes
          python supabase/seed.py --table game_predictions
          python supabase/seed.py --table weather
          python supabase/seed.py --table news
          python supabase/seed.py --table mc_simulations
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
