name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-extra.txt

      - name: Compile Python API and validation scripts
        run: |
          PYTHONPYCACHEPREFIX=/tmp/pycache python -m py_compile \
            $(find api -type f -name '*.py' | sort) \
            tests/test_api_integration.py \
            validate.py \
            scripts/validate_artifacts.py

      - name: Run backend and feature tests
        run: |
          python -m pytest -q \
            tests/test_api_integration.py \
            tests/test_backend_services.py \
            tests/test_features.py \
            tests/test_fixtures.py \
            tests/test_prediction_math.py \
            tests/test_scoring_distribution.py \
            tests/test_threshold_monotonicity.py

      - name: Validate checked-in data artifacts
        run: python scripts/validate_artifacts.py

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build

      - name: Smoke test frontend routes
        run: npm run smoke
